<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'JetBrains Mono', monospace">
  <rect width="960" height="360" fill="#060A13"/>

  <!-- ===== Concept 1: Rack Mark (recommended) ===== -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#0B1220" stroke="#223153" stroke-width="2"/>
    <!-- rack bars -->
    <rect x="32" y="38" width="96" height="20" rx="10" fill="#3D8BFF"/>
    <rect x="32" y="70" width="96" height="20" rx="10" fill="#2566D8"/>
    <rect x="32" y="102" width="96" height="20" rx="10" fill="#0E2A5C"/>
    <!-- gold LED -->
    <circle cx="112" cy="48" r="7" fill="#FFC53D"/>
    <circle cx="112" cy="48" r="13" fill="#FFC53D" opacity="0.25"/>
    <text x="80" y="200" text-anchor="middle" fill="#94A3B8" font-size="14">1 — Rack Mark</text>
    <text x="80" y="222" text-anchor="middle" fill="#5B6B85" font-size="11">primary / favicon</text>
  </g>

  <!-- ===== Concept 2: Prompt Mark ===== -->
  <g transform="translate(330,60)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#0B1220" stroke="#223153" stroke-width="2"/>
    <path d="M 40 56 L 72 80 L 40 104" fill="none" stroke="#3D8BFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="88" y="96" width="34" height="14" rx="7" fill="#FFC53D"/>
    <rect x="84" y="88" width="42" height="30" rx="12" fill="#FFC53D" opacity="0.18"/>
    <text x="80" y="200" text-anchor="middle" fill="#94A3B8" font-size="14">2 — Prompt Mark</text>
    <text x="80" y="222" text-anchor="middle" fill="#5B6B85" font-size="11">blog / OpenAPIGuy</text>
  </g>

  <!-- ===== Concept 3: LP Monogram ===== -->
  <g transform="translate(600,60)">
    <rect x="0" y="0" width="160" height="160" rx="28" fill="#0B1220" stroke="#223153" stroke-width="2"/>
    <!-- L -->
    <path d="M 44 44 L 44 116 L 78 116" fill="none" stroke="#3D8BFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- P -->
    <path d="M 96 116 L 96 44 L 112 44 A 22 22 0 0 1 112 88 L 96 88" fill="none" stroke="#5EA1FF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- gold node -->
    <circle cx="96" cy="116" r="8" fill="#FFC53D"/>
    <text x="80" y="200" text-anchor="middle" fill="#94A3B8" font-size="14">3 — LP Monogram</text>
    <text x="80" y="222" text-anchor="middle" fill="#5B6B85" font-size="11">avatar / social</text>
  </g>

  <!-- ===== Wordmark ===== -->
  <g transform="translate(0,300)">
    <text x="480" y="20" text-anchor="middle" font-size="32" font-weight="600">
      <tspan fill="#E6EDF8">parke</tspan><tspan fill="#FFC53D">.dev</tspan>
    </text>
    <text x="480" y="46" text-anchor="middle" fill="#5B6B85" font-size="12">wordmark — JetBrains Mono semibold</text>
  </g>
</svg>
